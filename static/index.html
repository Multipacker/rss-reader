<!DOCTYPE html>

<html lang="en-us">
    <head>
        <title>RSS Feed</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="index.js"></script>
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" href="favicon.svg" />
    </head>
    <body style="margin: 0;">
        <template id="item-template">
            <li class="item">
                <a class="item-link"></a>
                <p class="item-description"></p>
            </li>
        </template>
        <main style="display: flex; flex-direction: column;">
            <h1 style="text-align: center;">RSS Feed</h1>

            <select id="search_type" oninput="update_list();">
                <option>Articles</option>
                <option>Feeds</option>
            </select>
            <div style="display: flex;">
                <select id="search_filter" oninput="update_list();">
                    <option>All</option>
                    <option>Read</option>
                    <option>Unread</option>
                </select>
                <input id="search" placeholder="Search..." type="search" style="flex: 1;" oninput="update_list();"></input>
            </div>
            <ul id="results"></ul>
        </main>
    </body>
</html>

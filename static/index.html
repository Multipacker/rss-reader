<!DOCTYPE html>

<html lang="en-us">
    <head>
        <title>RSS Feed</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="index.js"></script>
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" href="favicon.svg" />
    </head>
    <body style="margin: 0;">
        <template id="item-template">
            <a class="item">
                <p class="item-title"></p>
                <p class="item-description"></p>
            </a>
        </template>
        <main style="display: flex; flex-direction: column; gap: 0.5em;">
            <h1 style="text-align: center; margin-bottom: 0;">RSS Feed</h1>

            <div style="display: flex; justify-content: center; flex-wrap: wrap; gap: 0.5em; margin-left: 0.5em; margin-right: 0.5em;">
                <select id="search_filter" oninput="update_list();">
                    <option>All</option>
                    <option>Read</option>
                    <option>Unread</option>
                </select>
                <select id="search_type" oninput="update_list();">
                    <option>Articles</option>
                    <option>Feeds</option>
                </select>
                <input id="search" style="flex: 1;" placeholder="Search..." type="search" oninput="update_list();"></input>
            </div>
            <div id="results"></div>
        </main>
    </body>
</html>
